name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  package:
    name: Package and report smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build twine cffconvert
      - name: Validate citation metadata
        run: cffconvert --validate --infile CITATION.cff
      - name: Validate SVG assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          for path in [
              Path("assets/system-review-graph-mark.svg"),
              Path("assets/social-preview.svg"),
          ]:
              ET.parse(path)
              print(f"valid SVG XML: {path}")
          PY
      - name: Build distributions
        run: |
          rm -rf dist
          python -m build
          python -m twine check dist/*
      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/srg-wheel-smoke
          /tmp/srg-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/srg-wheel-smoke/bin/system-review-graph list-examples
          /tmp/srg-wheel-smoke/bin/system-review-graph init-example --example fictional_ai_ops --out-dir /tmp/srg-example --force
          /tmp/srg-wheel-smoke/bin/system-review-graph build --manifest /tmp/srg-example/system_review_manifest.json --out-dir /tmp/srg-report --depth overview
      - name: Build bundled example reports
        run: |
          system-review-graph build --manifest examples/fictional_ai_ops/system_review_manifest.json --out-dir /tmp/srg-examples/fictional_ai_ops --depth deep --html --dot
          system-review-graph build --manifest examples/actual_repos/fastapi/system_review_manifest.json --out-dir /tmp/srg-examples/fastapi --depth deep --html --dot
          system-review-graph build --manifest examples/actual_repos/duckdb/system_review_manifest.json --out-dir /tmp/srg-examples/duckdb --depth deep --html --dot
          system-review-graph build --manifest examples/actual_repos/opentelemetry_collector/system_review_manifest.json --out-dir /tmp/srg-examples/opentelemetry_collector --depth deep --html --dot
          system-review-graph build --manifest examples/actual_repos/linux_kernel/system_review_manifest.json --out-dir /tmp/srg-examples/linux_kernel --depth blueprint --html --dot
      - name: Generate merge-time atlas
        run: |
          system-review-graph scan --repo . --atlas --out /tmp/system-review-atlas --max-subsystems 16 --build-reports --depth overview
      - uses: actions/upload-artifact@v6
        with:
          name: system-review-graph-dist
          path: dist/*
          if-no-files-found: error
