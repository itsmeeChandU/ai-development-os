name: CI

on:
  push:
  pull_request:

jobs:
  product-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run product proof gate
        run: python scripts/check_product.py
