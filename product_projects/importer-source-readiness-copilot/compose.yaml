services:
  app:
    build: .
    command: ["python", "scripts/serve_operator_app.py", "--host", "0.0.0.0", "--port", "8765", "--skip-refresh", "--no-open"]
    env_file:
      - .env
    ports:
      - "${IMPORTER_APP_PORT:-8765}:8765"
    volumes:
      - ./system_review_graph:/app/system_review_graph
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
