name: check

on:
  push:
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/ai_dev_os_check.py
      - run: python scripts/workflow_manifest_check.py
      - run: python scripts/self_test_flow.py
